<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Viáticos Monterrey</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <h1 class="logo">Brissa Zapata</h1>
            <nav class="menu-chico">
                <a href="../index.html">Inicio</a>
                 <a href="conagua.html">conagua</a>
                <a href="luz.html">luz</a>
                <a href="articulo.html">articulo</a>
                <a href="ahorro.html">ahorro</a>

            </nav>
        </div>
    </header>

    <main>
        <p class="instruccion">Cálculo de monto para cheque de viaje a Monterrey</p>
        
        <div class="card">
            <h2>Monto del Cheque</h2>
            <p>Gastos adicionales: <strong>$100.00 diarios</strong></p>

            <div class="input-group">
                <label>Número de días:</label>
                <input type="number" id="dias">
                
                <label>Costo Hotel (diario):</label>
                <input type="number" id="hotel">
                
                <label>Costo Comida (diario):</label>
                <input type="number" id="comida">
            </div>

            <button onclick="calcularViaticos()">Determinar Monto</button>

            <div class="resultado-caja">
                <p id="desgloseHotel">Hotel: $0.00</p>
                <p id="desgloseComida">Comida: $0.00</p>
                <p id="desgloseOtros">Otros: $0.00</p>
                <h3 id="resul">Total del Cheque: $0.00</h3>
            </div>
            
            <hr>
            <a href="../index.html" class="link-volver">Regresar al Menú</a>
        </div>
    </main>

    <script src="../scripts/functions.js"></script>
